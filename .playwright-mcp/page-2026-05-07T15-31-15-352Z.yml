        - code [ref=e239]: owner_secret = HKDF-SHA256(ikm = seed, salt = network_passphrase, info = "g2c-recovery-v1" ‖ account_id)
        - text: ", reduces modulo BN254 scalar order, and submits"
        - code [ref=e240]: commitment = Poseidon2(domain_sep_commitment, owner_secret)
        - text: to the
        - code [ref=e241]: recovery-controller
        - text: along with a one-time
        - strong [ref=e242]: recovery deposit
        - text: (covers ~40 days of TTL extension at current Soroban rent). The deposit is refundable on
        - code [ref=e243]: complete_recovery
        - text: net of consumed rent.
      - listitem [ref=e244]:
        - paragraph [ref=e245]:
          - strong [ref=e246]: Recovery trigger.
          - text: User has lost their passkey. Opens
          - code [ref=e247]: mysoroban.xyz/recover/
          - text: .
          - strong [ref=e248]: Cross-account discovery decision
          - text: ": the page does NOT maintain a server-side"
          - code [ref=e249]: commitment → C-address
          - text: index (privacy regression). Instead the user enters the C-address from a
          - strong [ref=e250]: recovery card
          - text: .
          - strong [ref=e251]: "Recovery-card content rule (security-critical):"
          - text: the recovery card contains
          - emphasis [ref=e252]: only
          - text: the C-address and a human-readable account label.
          - strong [ref=e253]: The card MUST NOT contain the BIP-39 seed
          - text: ", which is held on a separate paper artifact never digitized as QR. This separation defeats the physical-card exfiltration attack (photo of QR ≠ access to seed). Wallets MUST provide a recovery-card export at enrollment as an A5 acceptance criterion. Re-enters BIP-39 mnemonic with wordlist autocomplete + checksum validation + passphrase prompt + language selection."
        - paragraph [ref=e254]:
          - strong [ref=e255]: "Per-account recovery initiation rate limit:"
          - text: the controller enforces a maximum of 3
          - code [ref=e256]: initiate_recovery
          - text: calls per 90-day rolling window. This prevents recovery-deposit griefing (initiate→cancel→re-initiate). The 4th attempt within the window is rejected; the user must wait until the oldest initiation falls outside the window.
