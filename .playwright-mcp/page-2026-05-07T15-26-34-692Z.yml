    - paragraph [ref=e13]:
      - text: ZK proofs on Soroban are no longer hypothetical. We have a Noir/UltraHonk verifier validating real proofs on Stellar testnet today, and we are proposing to land it as a
      - strong [ref=e14]: recovery primitive in g2c
      - text: and a
      - strong [ref=e15]: privacy circuit in neftwerk
      - text: — under one coordinated grant with hard track separation.
    - paragraph [ref=e16]:
      - strong [ref=e17]: Why now.
      - text: Soroban Smart Accounts have shipped, and OpenZeppelin’s
      - code [ref=e18]: CustomAccountInterface
      - text: "is the de-facto integration surface (g2c uses it today). Two structural gaps remain:"
    - list [ref=e19]:
      - listitem [ref=e20]:
        - strong [ref=e21]: Recovery.
        - text: g2c’s current story is “register a backup passkey.” That is not enough — there is no key-rotation path for the lone-passkey case.
      - listitem [ref=e22]:
        - strong [ref=e23]: Privacy.
        - text: Stellar lacks a native primitive for hiding ownership while keeping provenance verifiable — a blocker for institutional and RWA use cases.
    - paragraph [ref=e24]:
      - text: Both reduce to the same ZK substrate.
      - strong [ref=e25]: Universal primitive in g2c + sector application in neftwerk.
    - paragraph [ref=e26]:
      - strong [ref=e27]: "Pillar 1 — g2c: ZK account recovery as a universal primitive."
      - text: At enrollment the user records a 24-word BIP-39 seed on paper, offline. The wallet deterministically derives
      - code [ref=e28]: owner_secret = HKDF(seed, account_id, network_passphrase)
      - text: and commits
      - strong [ref=e29]: only its one-way hash
      - code [ref=e30]: Poseidon2(owner_secret)
      - text: on-chain — the seed and
      - code [ref=e31]: owner_secret
      - text: never leave the browser; on-chain observers see a meaningless 32-byte hash. On recovery, the user re-enters the seed, re-derives the same
      - code [ref=e32]: owner_secret
      - text: ", and generates a Noir/UltraHonk zero-knowledge proof of"
      - emphasis [ref=e33]: “I know the preimage of the on-chain commitment”
      - text: — proving identity without revealing the secret. The proof is bound to a fully-specified
      - code [ref=e34]: auth_hash
      - text: (account, network, contract, new pubkey with on-curve + canonical-limb checks, nonce, timelock duration), so it can’t be replayed against a different rotation. A new
      - code [ref=e35]: g2c-recovery-controller
      - text: contract holds the pending-rotation state machine; a separate
      - code [ref=e36]: g2c-recovery-guard-policy
      - text: (OZ
      - code [ref=e37]: Policy
      - text: scoped to
      - code [ref=e38]: CallContract(self_addr)
      - text: ) blocks any signer eviction during the 30-day window. Cancellation requires both the WebAuthn signer AND a fresh seed-knowledge proof, capped at 2 cancels per recovery (closes the cancel-loop attack). Integration plugs into g2c’s existing OZ
      - code [ref=e39]: do_check_auth
      - text: pipeline; no protocol changes.
    - paragraph [ref=e40]:
      - strong [ref=e41]: "Pillar 2 — neftwerk: ZK privacy as a sector validator."
      - text: Neftwerk’s ARTS-1 token standard for art on Stellar uses three Noir circuits —
      - code [ref=e42]: arts1_mint
      - text: (dual-ECDSA institutional + collector),
      - code [ref=e43]: arts1_ownership
      - text: (private transfer authority), and
      - code [ref=e44]: arts1_recovery
      - text: "(the same primitive as Pillar 1 with token-id binding). Privacy model: “private title, public provenance.”"
    - paragraph [ref=e45]:
      - strong [ref=e46]: Why bundle.
      - text: One Noir + UltraHonk + Poseidon2 + BN254 + Soroban 26.x substrate. One verifier crate. One team. The recovery circuit is a
      - strong [ref=e47]: key-rotation primitive any Soroban Smart Account can adopt
      - text: ; neftwerk is the second consumer, not the only one. We estimate
      - strong [ref=e48]: ~30–40% engineering shared
      - text: "across the two tracks — concentrated in substrate work (verifier crate, browser SDK, Poseidon2 binding, OZ shim, audit RFP) rather than co-developed circuit/contract code. Track A and Track B are disbursed independently: an A0 benchmark failure or a Track B compliance gate does not affect Track A funding."
