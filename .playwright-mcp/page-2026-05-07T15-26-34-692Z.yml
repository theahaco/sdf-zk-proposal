      - listitem [ref=e1158]:
        - strong [ref=e1159]: 65-byte uncompressed P-256 pubkey
        - text: (
        - code [ref=e1160]: 0x04 ‖ x ‖ y
        - text: "): split into 5 limbs of ≤128 bits via big-endian decomposition. Order:"
        - code [ref=e1161]: (prefix_byte, x_hi, x_lo, y_hi, y_lo)
        - text: . Each limb range-checked
        - code [ref=e1162]: < 2^128
        - text: "in-circuit. Composition check:"
        - code [ref=e1163]: prefix == 0x04
        - text: and
        - code [ref=e1164]: x = x_hi * 2^128 + x_lo
        - text: and
        - code [ref=e1165]: y = y_hi * 2^128 + y_lo
        - text: and
        - code [ref=e1166]: (x, y)
