    - paragraph [ref=e354]:
      - strong [ref=e355]: Why UltraHonk over Groth16, Plonk, Halo2, RISC0/SP1?
      - text: Universal SRS removes per-circuit ceremonies — necessary for a recovery primitive instantiated against bespoke wallet circuits. A0 publishes a Groth16-on-Soroban verification-CPU comparison; if Groth16 verifies at <1/3 the budget for the fixed Pillar-1 recovery circuit, we add a Groth16 verifier
      - emphasis [ref=e356]: behind the same VK registry
      - text: (no fork of the substrate; same VK upgrade governance applies).
