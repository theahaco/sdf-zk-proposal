    - heading "3. Recovery flow end-to-end (Pillar 1)" [level=2] [ref=e358]
    - paragraph [ref=e359]: Six steps. (1)–(2) at SmartAccount enrollment; (3)–(6) on recovery.
    - list [ref=e360]:
      - listitem [ref=e361]:
        - strong [ref=e362]: Seed at enrollment.
        - text: During g2c onboarding the wallet asks the user to write down a BIP-39 mnemonic (passphrase optional, explicitly supported). The seed never touches the network.
      - listitem [ref=e363]:
        - strong [ref=e364]: Commitment + recovery deposit on-chain.
        - text: The wallet derives
        - code [ref=e365]: owner_secret = HKDF-SHA256(ikm = seed, salt = network_passphrase, info = "g2c-recovery-v1" ‖ account_id)
        - text: ", reduces modulo BN254 scalar order, and submits"
        - code [ref=e366]: commitment = Poseidon2(domain_sep_commitment, owner_secret)
        - text: to the
        - code [ref=e367]: recovery-controller
        - text: along with a one-time
        - strong [ref=e368]: recovery deposit
        - text: (covers ~40 days of TTL extension at current Soroban rent). The deposit is refundable on
        - code [ref=e369]: complete_recovery
        - text: net of consumed rent.
      - listitem [ref=e370]:
        - paragraph [ref=e371]:
          - strong [ref=e372]: Recovery trigger.
          - text: User has lost their passkey. Opens
          - code [ref=e373]: mysoroban.xyz/recover/
          - text: .
          - strong [ref=e374]: Cross-account discovery decision
          - text: ": the page does NOT maintain a server-side"
          - code [ref=e375]: commitment → C-address
          - text: index (privacy regression). Instead the user enters the C-address from a
          - strong [ref=e376]: recovery card
          - text: .
          - strong [ref=e377]: "Recovery-card content rule (security-critical):"
          - text: the recovery card contains
          - emphasis [ref=e378]: only
          - text: the C-address and a human-readable account label.
          - strong [ref=e379]: The card MUST NOT contain the BIP-39 seed
          - text: ", which is held on a separate paper artifact never digitized as QR. This separation defeats the physical-card exfiltration attack (photo of QR ≠ access to seed). Wallets MUST provide a recovery-card export at enrollment as an A5 acceptance criterion. Re-enters BIP-39 mnemonic with wordlist autocomplete + checksum validation + passphrase prompt + language selection."
        - paragraph [ref=e380]:
          - strong [ref=e381]: "Per-account recovery initiation rate limit:"
          - text: the controller enforces a maximum of 3
          - code [ref=e382]: initiate_recovery
          - text: calls per 90-day rolling window. This prevents recovery-deposit griefing (initiate→cancel→re-initiate). The 4th attempt within the window is rejected; the user must wait until the oldest initiation falls outside the window.
      - listitem [ref=e383]:
